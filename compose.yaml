services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: soccer_db
      POSTGRES_USER: soccer_user
      POSTGRES_PASSWORD: soccer_password

  config-server:
    build: ./config-server
    ports:
      - "8888:8888"
    environment:
      CONFIG_REPO_URL: https://github.com/pgr866/msc-soccer-project-config
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8888"]
      interval: 5s
      timeout: 5s
      retries: 10

  eureka-server:
    build: ./eureka-server
    ports:
      - "8761:8761"
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8761"]
      interval: 5s
      timeout: 5s
      retries: 10

  gateway:
    build: ./gateway
    ports:
      - "8080:8080"
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  player-service:
    build: ./player-service
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: soccer_db
      DB_USER: soccer_user
      DB_PASSWORD: soccer_password
    depends_on:
      db:
        condition: service_started
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  comment-service:
    build: ./comment-service
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: soccer_db
      DB_USER: soccer_user
      DB_PASSWORD: soccer_password
    depends_on:
      db:
        condition: service_started
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  dream-team-service:
    build: ./dream-team-service
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: soccer_db
      DB_USER: soccer_user
      DB_PASSWORD: soccer_password
    depends_on:
      db:
        condition: service_started
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
